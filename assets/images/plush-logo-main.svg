<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <!-- No background - transparent -->
  
  <!-- Flower Icon positioned top right -->
  <g id="flower" transform="translate(420, 100)">
    <!-- Petals with gradient effect -->
    <defs>
      <radialGradient id="petalGradient" cx="30%" cy="30%">
        <stop offset="0%" style="stop-color:#F4B8C1;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#B76E79;stop-opacity:0.95" />
      </radialGradient>
      <radialGradient id="centerGlow" cx="35%" cy="35%">
        <stop offset="0%" style="stop-color:#FAF5EF;stop-opacity:1" />
        <stop offset="60%" style="stop-color:#F4B8C1;stop-opacity:0.9" />
        <stop offset="100%" style="stop-color:#B76E79;stop-opacity:0.7" />
      </radialGradient>
    </defs>
    
    <!-- Six petals -->
    <ellipse cx="0" cy="-45" rx="32" ry="52" fill="url(#petalGradient)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-45" rx="32" ry="52" fill="url(#petalGradient)" transform="rotate(60)"/>
    <ellipse cx="0" cy="-45" rx="32" ry="52" fill="url(#petalGradient)" transform="rotate(120)"/>
    <ellipse cx="0" cy="-45" rx="32" ry="52" fill="url(#petalGradient)" transform="rotate(180)"/>
    <ellipse cx="0" cy="-45" rx="32" ry="52" fill="url(#petalGradient)" transform="rotate(240)"/>
    <ellipse cx="0" cy="-45" rx="32" ry="52" fill="url(#petalGradient)" transform="rotate(300)"/>
    
    <!-- Flower center with shine effect -->
    <circle cx="0" cy="0" r="22" fill="url(#centerGlow)"/>
    <circle cx="0" cy="0" r="18" fill="#FAF5EF" opacity="0.6"/>
    <circle cx="-6" cy="-6" r="5" fill="#FAF5EF" opacity="0.8"/>
  </g>
  
  <!-- Main Text: "Plush" in serif with elegant styling -->
  <text x="300" y="320" font-family="Georgia, 'Garamond', serif" font-size="140" font-weight="700" fill="#4A1560" text-anchor="middle" letter-spacing="-3" style="font-variant: normal;">
    Plush
  </text>
  
  <!-- Tagline: "Soft life, secured." in elegant script-like serif -->
  <text x="300" y="390" font-family="Georgia, 'Garamond', serif" font-size="48" fill="#B76E79" text-anchor="middle" font-style="italic" letter-spacing="2" font-weight="400">
    Soft life, secured.
  </text>
</svg>